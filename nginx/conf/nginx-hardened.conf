worker_processes  1;

events {
    worker_connections  128;
}

http {
    default_type  application/octet-stream;

    log_format lab '$remote_addr - $status "$request" '
                   'request_time=$request_time '
                   'connection=$connection '
                   'connection_requests=$connection_requests';

    access_log  logs/access.log lab;
    error_log   logs/error.log info;

    sendfile        on;

    # Slowloris holds unfinished request headers. Shorter header timeout makes
    # Nginx release those connections earlier.
    client_header_timeout  5s;

    # Not the main Slowloris control, but useful for related slow body attacks.
    client_body_timeout    10s;

    # Keep idle client connections from staying around too long in this lab.
    keepalive_timeout      10s;

    # Reset timed-out connections so they are cleaned up quickly.
    reset_timedout_connection on;

    # Limit how many simultaneous connections one source IP can occupy.
    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_conn_status 429;

    upstream local_backend {
        server 127.0.0.1:18080;
        keepalive 16;
    }

    server {
        listen       127.0.0.1:8080;
        server_name  localhost;

        limit_conn perip 10;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_pass http://local_backend;
        }
    }
}
